<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<style>
	#navbar{
		display: none;
	}	
</style>
</head>
<body>
	<h1>register.html</h1>
	<hr>
	<div id="navbar">
		<a href="/login.html" id="linkLogin">Login |</a>
		<span id="userNameWrapper"><span id="userName"></span> 님 안녕하세요. |</span>
		<a href="#" id="linkLogout">Logout |</a>
		<a href="/board.html">Board |</a>
		<a href="/register.html" id="linkRegister">Register</a>	
	</div>
	<div>
		name : <input type="text" name="name" id="name">
	</div>
	<div>
		email : <input type="text" name="email" id="email">
	</div>
	<div>
		password : <input type="password" name="password" id="password">
	</div>
	<button id="btnRegister">회원가입</button>
	
<script src="/assets/js/common.js"></script>
<script>
	window.onload = function(){
		initUI();
		document.querySelector("#linkLogout").onclick = logout;
		document.querySelector("#btnRegister").onclick = register;
	}

	async function register(){
		// parameter, value
		let name = document.querySelector("#name").value;
		let email = document.querySelector("#email").value;
		let password = document.querySelector("#password").value;
		
		let urlParams = new URLSearchParams({
			name, email, password  // shorthand property
		});
		
		// url
		let url = "/users/register";
		
		// fetch options
		let fetchOptions = {
			method: "post",
			body: urlParams
		}
		
		let response = await fetch(url, fetchOptions);
		let data = await response.json(); // response 에 담긴 json 부분을 javascript object 로 변환
		
		console.log(data);
		
		if( data.result == "success" ){
			alert("회원가입 완료");
			
			// login.html 로 이동
			window.location.href="/login.html";
			
		}else{
			alert("회원가입 실패");
		}
	}

</script>	
</body>
</html>
