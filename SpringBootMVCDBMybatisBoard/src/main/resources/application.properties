spring.application.name=SpringBootMVCDBMybatisBoard

# jsp ViewResolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# server session persistence off
server.servlet.session.persistent=false

# Data Source
spring.datasource.url=jdbc:mysql://localhost:3306/board?useUnicode=true
spring.datasource.username=ureca
spring.datasource.password=ureca
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mybatis
mybatis.config-location=classpath:/config/mybatis-config.xml

# Logging
logging.level.com.mycom.myapp=debug