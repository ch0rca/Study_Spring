spring.application.name=SpringBootJpaBasicLogging

# data source
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jpa_basic_logging
spring.datasource.username=root
spring.datasource.password=1234

# session persistence
server.servlet.session.persistent=false

# jpa
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# logging
#logging.level.com.mycom.myapp=INFO
#logging.level.com.mycom.myapp.controller==INFO
#logging.level.com.mycom.myapp.service==DEBUG

logging.file.name=logs/basic-logging.log
logging.logback.rollingpolicy.file-name-pattern=logs/basic-logging-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=7