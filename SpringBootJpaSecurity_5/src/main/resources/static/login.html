<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<!-- 우리의 login.html 을 사용하고, 백엔드에서 csrf 적용할 겨우, 프론트의 login.html 도 대응 코드를 작성해야 한다. -->
	<h1>login.html 입니다.</h1>	
	<hr>

	<input type="text" id="username" name="username" value="dskim"><br>
	<input type="password" id="password" name="password" value="1234"><br>
	
	<!-- csrf token-->
	<input type="hidden" id="_csrf" name="_csrf" value="">
	
	<button id="btnLogin">Login</button>

	<div id="errorMessage" style="color: red; margin-top: 10px;"></div>
	<script>
		window.onload = function(){
			getCsrfToken();
			
			document.querySelector("#btnLogin").onclick = login;
		}
	
		async function getCsrfToken(){
			let response = await fetch("/csrf-token", {credentials: "same-origin"})
			let data = await response.json();
			document.querySelector("#_csrf").value = data.token;
		}
		
		async function login(){
			
			let url = "/login";
			
			let username = document.querySelector("#username").value;
			let password = document.querySelector("#password").value;
			let _csrf = document.querySelector("#_csrf").value;
			
			let urlParams = new URLSearchParams({
				username, password, _csrf  // javascript es6 shorthand property 문법
			});
			
			let fetchOptions = {
				method: "post",
				body: urlParams
			}
			
			let response = await fetch(url, fetchOptions);
			let data = await response.json();
			
			console.log(data);
			
			// 로그인 결과에 따른 처리
			if( data.result == "success" ){
				window.location.href = "/";
			}else{
				document.querySelector("#errorMessage").innerText = "username 또는 password 가 올바르지 않습니다.";
			}
		}		
	</script>	
</body>
</html>
