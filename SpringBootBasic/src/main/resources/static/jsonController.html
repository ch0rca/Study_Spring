<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>jsonController.html</h1>
	<hr>
	<button id="btnSendEmp">Emp 보내기</button>
	<button id="btnSendEmpList">Emp List 보내기</button>
	
	<script>
		let emp = {
			employeeId: 1,
			firstName: '길동',
			lastName: '홍',
			email: 'hong@gildong.com',
			hireDate: '2025-11-24'
		}
		
		let empList = [
			{
				employeeId: 1,
				firstName: '길동',
				lastName: '홍',
				email: 'hong@gildong.com',
				hireDate: '2025-11-24'
			},
			{
				employeeId: 2,
				firstName: '길동',
				lastName: '이',
				email: '2@gildong.com',
				hireDate: '2025-11-25'
			},
			{
				employeeId: 3,
				firstName: '길동',
				lastName: '삼',
				email: '3@gildong.com',
				hireDate: '2025-11-26'
			}
		];
		
		window.onload = function(){
			document.querySelector("#btnSendEmp").onclick = async function(){
				
				let fetchOptions = {
					method: "post",
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(emp)
				}
				
				let response = await fetch("/emp", fetchOptions);
				let data = await response.json();
				console.log(data);
			};
			
			document.querySelector("#btnSendEmpList").onclick = async function(){
				
				let fetchOptions = {
					method: "post",
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(empList)
				}
				
				let response = await fetch("/emplist", fetchOptions);
				let data = await response.json();
				console.log(data);
			};			
		}
		
	</script>
</body>
</html>
